<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Prompter">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="/manifest.json">
<title>Телепромптер</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: #222;
    --accent: #e8ff00;
    --text: #f0f0f0;
    --muted: #444;
    --green: #00ff88;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #000; color: var(--text); font-family: 'IBM Plex Sans', sans-serif; height: 100dvh; overflow: hidden; }

  .screen { display: none; width: 100%; height: 100dvh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ══ ROLE SELECT ══ */
  #screen-role {
    background: var(--bg); align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  #screen-role::before {
    content: 'PROMPTER'; position: absolute;
    font-family: 'Bebas Neue', sans-serif; font-size: 38vw;
    color: #111; letter-spacing: -2vw; line-height: 1;
    user-select: none; pointer-events: none;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
  }
  .role-inner { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 32px; padding: 40px 24px; }
  .role-title { font-family: 'Bebas Neue', sans-serif; font-size: 52px; letter-spacing: 4px; color: var(--accent); text-align: center; line-height: 1; }
  .role-subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; text-align: center; }
  .role-buttons { display: flex; flex-direction: column; gap: 12px; width: 260px; }
  .btn-role {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    font-family: 'IBM Plex Mono', monospace; font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
    padding: 18px 24px; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 16px;
  }
  .btn-role:active { opacity: 0.7; }
  .btn-role.controller { border-color: var(--accent); }
  .btn-role-icon { font-size: 22px; }
  .btn-role-text { display: flex; flex-direction: column; gap: 3px; }
  .btn-role-label { font-size: 13px; letter-spacing: 2px; }
  .btn-role-desc { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: none; font-family: 'IBM Plex Sans', sans-serif; }

  /* ══ CONTROLLER ══ */
  #screen-controller { background: var(--bg); }

  /* Mirror — top portion */
  .ctrl-mirror {
    flex: 0 0 42%;
    position: relative;
    background: #000;
    overflow: hidden;
    border-bottom: 1px solid var(--border);
  }
  /* Scale-down the text to fit the mirror */
  .ctrl-mirror-inner {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }
  .ctrl-mirror-text-wrap {
    position: absolute;
    transform-origin: top left;
    padding: 0 32px;
    padding-bottom: 844px; /* will be updated by JS to match display height */
    will-change: transform;
  }
  .ctrl-mirror-text {
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 300;
    line-height: 1.35;
    color: #fff;
    white-space: pre-wrap;
    word-break: break-word;
    width: 600px; margin: 0 auto;
    /* Must match .disp-text width exactly */
  }
  /* Cue line in mirror */
  .ctrl-mirror-cue {
    position: absolute;
    top: 38%; left: 0; right: 0;
    height: 1px; background: var(--accent); opacity: 0.4;
    pointer-events: none; z-index: 2;
  }
  /* Dim overlay when paused */
  .ctrl-mirror-dim {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.45);
    opacity: 0; transition: opacity 0.2s;
    pointer-events: none; z-index: 3;
    display: flex; align-items: center; justify-content: center;
  }
  .ctrl-mirror-dim.paused { opacity: 1; }
  .ctrl-mirror-dim-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: 4px; color: var(--accent);
  }
  /* No text state */
  .ctrl-mirror-empty {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    letter-spacing: 2px; color: var(--muted); text-transform: uppercase;
    pointer-events: none;
  }
  /* Progress bar at top of mirror */
  .ctrl-mirror-progress {
    position: absolute; top: 0; left: 0; right: 0; height: 2px; z-index: 5;
    background: transparent;
  }
  .ctrl-mirror-progress-fill {
    height: 100%; width: 0%; background: var(--accent);
    transition: width 0.2s linear;
  }

  /* Panel — bottom portion */
  .ctrl-panel {
    flex: 1;
    display: flex; flex-direction: column;
    padding: 0;
    overflow: hidden;
  }

  /* Play button — big, full width */
  .ctrl-play-btn {
    width: 100%; flex: 0 0 72px;
    background: transparent; border: none; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center; gap: 12px;
    cursor: pointer; -webkit-appearance: none;
    transition: background 0.1s;
  }
  .ctrl-play-btn:active { background: rgba(232,255,0,0.08); }
  .ctrl-play-btn.playing { background: rgba(232,255,0,0.05); }
  .ctrl-play-icon { font-size: 28px; }
  .ctrl-play-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 4px; color: var(--accent);
  }

  /* Sliders area */
  .ctrl-sliders {
    flex: 1; display: flex; flex-direction: column;
    justify-content: center; gap: 0;
    border-bottom: 1px solid var(--border);
  }
  .ctrl-slider-row {
    flex: 1; display: flex; align-items: center; gap: 14px;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
  }
  .ctrl-slider-row:last-child { border-bottom: none; }
  .ctrl-slider-label {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    letter-spacing: 2px; color: var(--muted); text-transform: uppercase;
    min-width: 54px;
  }
  .ctrl-slider-val {
    font-family: 'Bebas Neue', sans-serif; font-size: 26px;
    min-width: 44px; text-align: right;
  }
  .ctrl-slider-val.accent { color: var(--accent); }
  .ctrl-slider-val.white { color: var(--text); }
  input[type=range] {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 3px; background: var(--border); outline: none; border-radius: 0;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 22px; height: 22px;
    background: var(--accent); border-radius: 0; cursor: pointer;
  }

  /* Bottom action row */
  .ctrl-actions {
    flex: 0 0 52px; display: flex;
  }
  .ctrl-action-btn {
    flex: 1; background: transparent; border: none;
    border-right: 1px solid var(--border);
    color: var(--muted); font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
    -webkit-appearance: none;
  }
  .ctrl-action-btn:last-child { border-right: none; }
  .ctrl-action-btn:active { background: rgba(255,255,255,0.05); color: var(--text); }

  /* Conn status row */
  .ctrl-conn-row {
    flex: 0 0 28px; display: flex; align-items: center;
    padding: 0 16px; gap: 8px; border-top: 1px solid var(--border);
  }
  .conn-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--muted); transition: background 0.3s;
    flex-shrink: 0;
  }
  .conn-dot.online { background: var(--green); box-shadow: 0 0 5px var(--green); }
  .conn-label {
    font-family: 'IBM Plex Mono', monospace; font-size: 9px;
    letter-spacing: 2px; color: var(--muted); text-transform: uppercase;
  }

  /* ══ DISPLAY ══ */
  #screen-display { background: #000; }
  .disp-wrap {
    position: absolute; width: 100%;
    padding: 0 32px 100vh 32px;
    will-change: transform;
  }
  .disp-text {
    font-family: 'IBM Plex Sans', sans-serif; font-weight: 300;
    font-size: 52px; line-height: 1.35; color: #fff;
    white-space: pre-wrap; word-break: break-word;
    width: 600px; margin: 0 auto;
  }
  .disp-cue {
    position: absolute; top: 38%; left: 0; right: 0;
    height: 2px; background: var(--accent); opacity: 0.35;
    pointer-events: none; z-index: 5;
  }
  .disp-waiting {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    letter-spacing: 3px; color: #2a2a2a; text-transform: uppercase;
    pointer-events: none;
  }

  /* ══ EDIT MODAL ══ */
  #editModal {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: var(--bg); flex-direction: column;
  }
  #editModal.active { display: flex; }
  .edit-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .edit-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; color: var(--accent); }
  .edit-close {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase; padding: 8px 14px; cursor: pointer;
  }
  .edit-close:active { border-color: var(--accent); color: var(--accent); }
  #scriptInput {
    flex: 1; background: var(--surface); border: none; color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif; font-size: 15px; line-height: 1.7;
    padding: 16px 20px; resize: none; outline: none; -webkit-appearance: none; min-height: 0;
  }
  #scriptInput::placeholder { color: var(--muted); }
  .edit-footer {
    padding: 12px 20px; border-top: 1px solid var(--border);
    display: flex; gap: 10px; flex-shrink: 0;
  }
  .edit-btn {
    flex: 1; background: transparent; border: 1px solid var(--border); color: var(--muted);
    font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase; padding: 12px; cursor: pointer;
  }
  .edit-btn.primary { border-color: var(--accent); color: var(--accent); background: rgba(232,255,0,0.05); }
  .edit-btn:active { opacity: 0.7; }
</style>
</head>
<body>

<!-- ROLE SELECT -->
<div id="screen-role" class="screen active">
  <div class="role-inner">
    <div>
      <div class="role-title">Prompter</div>
      <div class="role-subtitle">Выберите роль устройства</div>
    </div>
    <div class="role-buttons">
      <button class="btn-role controller" onclick="joinAs('controller')">
        <span class="btn-role-icon">🎛</span>
        <span class="btn-role-text">
          <span class="btn-role-label">Контроллер</span>
          <span class="btn-role-desc">Миниатюра + управление</span>
        </span>
      </button>
      <button class="btn-role" onclick="joinAs('display')">
        <span class="btn-role-icon">📺</span>
        <span class="btn-role-text">
          <span class="btn-role-label">Дисплей</span>
          <span class="btn-role-desc">Только отображение текста</span>
        </span>
      </button>
    </div>
  </div>
</div>

<!-- CONTROLLER -->
<div id="screen-controller" class="screen">
  <!-- Mirror top -->
  <div class="ctrl-mirror" id="ctrlMirror">
    <div class="ctrl-mirror-progress"><div class="ctrl-mirror-progress-fill" id="ctrlProgress"></div></div>
    <div class="ctrl-mirror-inner">
      <div class="ctrl-mirror-text-wrap" id="ctrlTextWrap">
        <div class="ctrl-mirror-text" id="ctrlText"></div>
      </div>
    </div>
    <div class="ctrl-mirror-cue"></div>
    <div class="ctrl-mirror-dim paused" id="ctrlDim"></div>
    <div class="ctrl-mirror-empty" id="ctrlEmpty">Нет текста — нажмите «Текст»</div>
  </div>

  <!-- Controls bottom -->
  <div class="ctrl-panel">
    <!-- Play/Pause -->
    <button class="ctrl-play-btn" id="playBtn" onclick="togglePlay()">
      <span class="ctrl-play-icon" id="playIcon">▶</span>
      <span class="ctrl-play-label" id="playLabel">СТАРТ</span>
    </button>

    <!-- Sliders -->
    <div class="ctrl-sliders">
      <div class="ctrl-slider-row">
        <span class="ctrl-slider-label">Скорость</span>
        <input type="range" id="speedSlider" min="10" max="300" value="50" oninput="onSpeed(this.value)">
        <span class="ctrl-slider-val accent" id="speedVal">50</span>
      </div>
      <div class="ctrl-slider-row">
        <span class="ctrl-slider-label">Размер</span>
        <input type="range" id="fontSlider" min="24" max="120" value="52" oninput="onFontSize(this.value)">
        <span class="ctrl-slider-val white" id="fontVal">52</span>
      </div>
      <div class="ctrl-slider-row">
        <span class="ctrl-slider-label">Поля</span>
        <input type="range" id="paddingSlider" min="5" max="35" value="10" oninput="onTextPadding(this.value)">
        <span class="ctrl-slider-val white" id="paddingVal">10%</span>
      </div>
    </div>

    <!-- Action buttons -->
    <div class="ctrl-actions">
      <button class="ctrl-action-btn" onclick="openEdit()">✏️ Текст</button>
      <button class="ctrl-action-btn" onclick="seekBack()">⏮ Назад</button>
      <button class="ctrl-action-btn" onclick="seekFwd()">Вперёд ⏭</button>
      <button class="ctrl-action-btn" onclick="document.getElementById('fileInput').click()">📁 Файл</button>
    </div>

    <!-- Connection status -->
    <div class="ctrl-conn-row">
      <div class="conn-dot" id="connDot"></div>
      <span class="conn-label" id="connLabel">ОФЛАЙН</span>
    </div>
  </div>
</div>

<!-- DISPLAY -->
<div id="screen-display" class="screen" style="position:relative; overflow:hidden;">
  <div class="disp-wrap" id="dispWrap">
    <div class="disp-text" id="dispText"></div>
  </div>
  <div class="disp-cue"></div>
  <div class="disp-waiting" id="dispWaiting">ОЖИДАНИЕ СИГНАЛА...</div>
</div>

<!-- EDIT MODAL -->
<div id="editModal">
  <div class="edit-header">
    <div class="edit-title">Текст скрипта</div>
    <button class="edit-close" onclick="closeEdit()">✕</button>
  </div>
  <textarea id="scriptInput" placeholder="Вставьте или введите текст..."></textarea>
  <div class="edit-footer">
    <button class="edit-btn" onclick="closeEdit()">Отмена</button>
    <button class="edit-btn primary" onclick="sendText()">↑ Отправить на все</button>
  </div>
</div>

<input type="file" id="fileInput" accept=".txt" style="display:none" onchange="loadFile(event)">

<script>
const WS_URL = location.protocol === 'https:'
  ? `wss://${location.host}` : `ws://${location.host}`;

let ws = null, role = null;
let state = { text: '', playing: false, speed: 50, position: 0, fontSize: 52, textWidth: 600 };
let displayW = 0, displayH = 0;
let animFrame = null, lastTimestamp = null;
let currentPos = 0, totalHeight = 0;
let isSeeking = false;

const MIRROR_SCALE = 0.32;

// ── WebRTC config ──
const RTC_CONFIG = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' }
  ]
};

// Controller: map of displayId -> { pc, dc, ready }
const peers = new Map();
// Display: single peer connection from controller
let displayPC = null;
let displayDC = null;
let rtcReady = false; // true when at least one DataChannel is open

// ── SEND COMMAND (WebRTC if available, WS fallback) ──
function sendCommand(msg) {
  const data = JSON.stringify(msg);

  if (role === 'controller') {
    // Send via DataChannel to all connected displays
    let sentViaRTC = false;
    peers.forEach(peer => {
      if (peer.dc && peer.dc.readyState === 'open') {
        peer.dc.send(data);
        sentViaRTC = true;
      }
    });
    // Always send via WS too (for server state sync + fallback)
    ws?.send(data);
  } else {
    // Display shouldn't normally send commands, but just in case
    ws?.send(data);
  }
}

// ── CONNECT (WebSocket for signaling + fallback) ──
function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    setConnected(true);
    const msg = { type: 'join', role };
    if (role === 'display') {
      msg.displayW = window.innerWidth;
      msg.displayH = window.innerHeight;
    }
    ws.send(JSON.stringify(msg));
  };
  ws.onclose = () => {
    setConnected(false);
    rtcReady = false;
    setTimeout(connect, 2000);
  };
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    // Handle signaling messages
    if (msg.type.startsWith('rtc-') || msg.type === 'display-joined' || msg.type === 'display-left') {
      handleSignaling(msg);
      return;
    }
    // On display with active RTC: only accept 'state' via WS (initial sync), skip command duplicates
    if (role === 'display' && rtcReady) {
      if (msg.type === 'state' || msg.type === 'displayDimensions') {
        handleMessage(msg);
      }
      // else: skip — we'll get it via DataChannel
      return;
    }
    handleMessage(msg);
  };
}

// ── WebRTC SIGNALING ──
function handleSignaling(msg) {
  switch (msg.type) {
    case 'display-joined':
      if (role === 'controller') createPeerConnection(msg.displayId);
      break;
    case 'display-left':
      if (role === 'controller') {
        const peer = peers.get(msg.displayId);
        if (peer?.pc) peer.pc.close();
        peers.delete(msg.displayId);
        updateRTCStatus();
      }
      break;
    case 'rtc-offer':
      if (role === 'display') handleOffer(msg);
      break;
    case 'rtc-answer':
      if (role === 'controller') handleAnswer(msg);
      break;
    case 'rtc-ice':
      handleICE(msg);
      break;
  }
}

// Controller: create peer connection to a display
async function createPeerConnection(displayId) {
  const pc = new RTCPeerConnection(RTC_CONFIG);
  const dc = pc.createDataChannel('commands', { ordered: true });
  const peer = { pc, dc, ready: false };
  peers.set(displayId, peer);

  dc.onopen = () => {
    peer.ready = true;
    updateRTCStatus();
    console.log(`[RTC] DataChannel open to display ${displayId}`);
  };
  dc.onclose = () => {
    peer.ready = false;
    updateRTCStatus();
  };

  pc.onicecandidate = e => {
    if (e.candidate) {
      ws?.send(JSON.stringify({ type: 'rtc-ice', candidate: e.candidate, targetId: displayId }));
    }
  };

  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
      console.log(`[RTC] Connection ${pc.connectionState} to display ${displayId}, will retry`);
      peer.ready = false;
      updateRTCStatus();
      // Retry after a short delay
      setTimeout(() => {
        if (peers.has(displayId)) {
          pc.close();
          peers.delete(displayId);
          createPeerConnection(displayId);
        }
      }, 2000);
    }
  };

  try {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    ws?.send(JSON.stringify({ type: 'rtc-offer', offer, targetId: displayId }));
  } catch (err) {
    console.warn('[RTC] Failed to create offer:', err);
  }
}

// Display: handle incoming offer from controller
async function handleOffer(msg) {
  if (displayPC) displayPC.close();

  const pc = new RTCPeerConnection(RTC_CONFIG);
  displayPC = pc;

  pc.ondatachannel = e => {
    displayDC = e.channel;
    displayDC.onmessage = ev => {
      const cmd = JSON.parse(ev.data);
      handleMessage(cmd);
    };
    displayDC.onopen = () => {
      rtcReady = true;
      console.log('[RTC] DataChannel open from controller');
    };
    displayDC.onclose = () => { rtcReady = false; };
  };

  pc.onicecandidate = e => {
    if (e.candidate) {
      ws?.send(JSON.stringify({ type: 'rtc-ice', candidate: e.candidate }));
    }
  };

  try {
    await pc.setRemoteDescription(msg.offer);
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    ws?.send(JSON.stringify({ type: 'rtc-answer', answer, fromId: msg.fromId }));
  } catch (err) {
    console.warn('[RTC] Failed to handle offer:', err);
  }
}

// Controller: handle answer from display
async function handleAnswer(msg) {
  const peer = peers.get(msg.fromId);
  if (!peer) return;
  try {
    await peer.pc.setRemoteDescription(msg.answer);
  } catch (err) {
    console.warn('[RTC] Failed to set answer:', err);
  }
}

// Both: handle ICE candidate
async function handleICE(msg) {
  try {
    if (role === 'controller') {
      const peer = peers.get(msg.fromId);
      if (peer) await peer.pc.addIceCandidate(msg.candidate);
    } else {
      if (displayPC) await displayPC.addIceCandidate(msg.candidate);
    }
  } catch (err) {
    // ICE candidates can arrive before remote description is set, safe to ignore
  }
}

function updateRTCStatus() {
  if (role !== 'controller') return;
  const anyReady = [...peers.values()].some(p => p.ready);
  rtcReady = anyReady;
  // Update connection label to show P2P status
  const label = document.getElementById('connLabel');
  if (label) {
    if (rtcReady) {
      label.textContent = 'P2P';
      label.style.color = 'var(--green)';
    } else {
      label.textContent = 'ОНЛАЙН';
      label.style.color = '';
    }
  }
}

function setConnected(v) {
  if (role !== 'controller') return;
  document.getElementById('connDot').classList.toggle('online', v);
  if (!v) {
    document.getElementById('connLabel').textContent = 'ОФЛАЙН';
    document.getElementById('connLabel').style.color = '';
  } else if (!rtcReady) {
    document.getElementById('connLabel').textContent = 'ОНЛАЙН';
    document.getElementById('connLabel').style.color = '';
  }
}

// ── MESSAGES (from WS or DataChannel) ──
function handleMessage(msg) {
  switch (msg.type) {
    case 'state': applyState(msg); break;
    case 'displayDimensions':
      displayW = msg.displayW;
      displayH = msg.displayH;
      if (role === 'controller') { applyMirrorDimensions(); initMirrorScale(); }
      break;

    case 'play':
      state.playing = true; state.speed = msg.speed;
      if (role === 'controller') currentPos = msg.position;
      lastTimestamp = performance.now();
      startScroll(); updatePlayBtn(); updateDim();
      break;

    case 'pause':
      state.playing = false;
      if (role === 'controller') currentPos = msg.position;
      stopScroll(); applyScrollPos(); updatePlayBtn(); updateDim(); updateProgress();
      break;

    case 'seek':
      if (role === 'controller' && isSeeking) break;
      currentPos = msg.position;
      lastTimestamp = performance.now() - (Date.now() - (msg.lastUpdate || Date.now()));
      if (msg.playing) startScroll(); else applyScrollPos();
      updateProgress();
      break;

    case 'speed':
      state.speed = msg.speed; currentPos = msg.position;
      lastTimestamp = performance.now() - (Date.now() - (msg.lastUpdate || Date.now()));
      if (role === 'controller') {
        document.getElementById('speedSlider').value = msg.speed;
        document.getElementById('speedVal').textContent = msg.speed;
      }
      break;

    case 'fontSize':
      state.fontSize = msg.fontSize; applyFontSize(); break;

    case 'textPadding':
      state.textPadding = msg.textPadding; applyTextPadding(); break;
  }
}

function applyState(s) {
  state = { ...state, ...s };
  currentPos = s.position;
  setText(s.text);
  applyFontSize();
  setTimeout(() => { calcHeight(); applyScrollPos(); updateProgress(); }, 80);
  if (role === 'controller') {
    document.getElementById('speedSlider').value = s.speed;
    document.getElementById('speedVal').textContent = s.speed;
    document.getElementById('fontSlider').value = s.fontSize;
    document.getElementById('fontVal').textContent = s.fontSize;
    if (s.textPadding != null) {
      document.getElementById('paddingSlider').value = s.textPadding;
      document.getElementById('paddingVal').textContent = s.textPadding + '%';
    }
  }
  applyTextPadding();
  updatePlayBtn(); updateDim();
  if (s.playing) { lastTimestamp = performance.now(); startScroll(); }
}

function setText(text) {
  const ctrlEl = document.getElementById('ctrlText');
  const dispEl = document.getElementById('dispText');
  if (ctrlEl) ctrlEl.textContent = text;
  if (dispEl) dispEl.textContent = text;
  const empty = document.getElementById('ctrlEmpty');
  if (empty) empty.style.display = text ? 'none' : '';
  const dw = document.getElementById('dispWaiting');
  if (dw) dw.style.display = text ? 'none' : '';
  state.text = text;
}

// ── SCROLL ──
function startScroll() {
  if (animFrame) cancelAnimationFrame(animFrame);
  lastTimestamp = lastTimestamp ?? performance.now();
  animFrame = requestAnimationFrame(scrollStep);
}
function stopScroll() {
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  lastTimestamp = null;
}
function scrollStep(ts) {
  if (!state.playing) { stopScroll(); return; }
  const dt = (ts - (lastTimestamp ?? ts)) / 1000;
  lastTimestamp = ts;
  currentPos += state.speed * dt;
  if (currentPos >= totalHeight) {
    currentPos = totalHeight; state.playing = false;
    stopScroll(); updatePlayBtn(); updateDim();
    if (role === 'controller') sendCommand({ type: 'pause', position: currentPos });
  }
  applyScrollPos(); updateProgress();
  animFrame = requestAnimationFrame(scrollStep);
}

function applyScrollPos() {
  // Display: normal translateY
  const dispWrap = document.getElementById('dispWrap');
  if (dispWrap) dispWrap.style.transform = `translateY(${-currentPos}px)`;

  const ctrlWrap = document.getElementById('ctrlTextWrap');
  if (ctrlWrap) {
    const s = window._mirrorScale || MIRROR_SCALE;
    ctrlWrap.style.transform = `scale(${s}) translateY(${-currentPos}px)`;
  }
}

function applyFontSize() {
  const fs = state.fontSize + 'px';
  const ctrlEl = document.getElementById('ctrlText');
  const dispEl = document.getElementById('dispText');
  if (ctrlEl) ctrlEl.style.fontSize = fs;
  if (dispEl) dispEl.style.fontSize = fs;
  setTimeout(calcHeight, 80);
}

function calcHeight() {
  if (role === 'display') {
    const w = document.getElementById('dispWrap');
    if (w) totalHeight = Math.max(0, w.scrollHeight - window.innerHeight);
  } else {
    // Controller: calculate based on display dimensions
    // The mirror wrap renders at display width, so scrollHeight is in display coords
    const w = document.getElementById('ctrlTextWrap');
    const dH = displayH || window._displayH || 844;
    if (w) totalHeight = Math.max(0, w.scrollHeight - dH);
  }
}

function updateProgress() {
  const fill = document.getElementById('ctrlProgress');
  if (!fill) return;
  fill.style.width = (totalHeight > 0 ? (currentPos / totalHeight) * 100 : 0) + '%';
}

function updatePlayBtn() {
  if (role !== 'controller') return;
  const playing = state.playing;
  document.getElementById('playIcon').textContent = playing ? '⏸' : '▶';
  document.getElementById('playLabel').textContent = playing ? 'ПАУЗА' : 'СТАРТ';
  document.getElementById('playBtn').classList.toggle('playing', playing);
}

function updateDim() {
  if (role !== 'controller') return;
  const dim = document.getElementById('ctrlDim');
  dim.classList.toggle('paused', !state.playing);
}

// ── JOIN ──
function joinAs(r) {
  role = r;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(r === 'controller' ? 'screen-controller' : 'screen-display').classList.add('active');
  if (r === 'controller') {
    // Wait for layout before computing mirror dimensions
    requestAnimationFrame(() => {
      initMirrorScale();
      setupMirrorGestures();
    });
  }
  if (r === 'display') {
    if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(() => {});
  }
  connect();
}

// ── MIRROR GESTURES (tap = pause, swipe = seek) ──
function setupMirrorGestures() {
  const mirror = document.getElementById('ctrlView') || document.querySelector('.ctrl-mirror');
  // Use the mirror div for gestures
  const el = document.getElementById('ctrlMirror');
  if (!el) return;

  let startY = 0, startTime = 0, moved = false;

  el.addEventListener('touchstart', e => {
    startY = e.touches[0].clientY;
    startTime = Date.now();
    moved = false;
    isSeeking = false;
  }, { passive: true });

  el.addEventListener('touchmove', e => {
    const dy = e.touches[0].clientY - startY;
    if (Math.abs(dy) > 8) {
      moved = true;
      isSeeking = true;
      const delta = -dy * (1 / (window._mirrorScale || MIRROR_SCALE)) * 0.5;
      currentPos = Math.max(0, Math.min(totalHeight, currentPos + delta));
      startY = e.touches[0].clientY;
      applyScrollPos();
      updateProgress();
      // broadcast live so displays follow in real time
      sendCommand({ type: 'seek', position: currentPos });
    }
  }, { passive: true });

  el.addEventListener('touchend', e => {
    isSeeking = false;
    if (!moved && Date.now() - startTime < 300) {
      togglePlay();
    }
  }, { passive: true });
}

// ── CONTROLS ──
function togglePlay() {
  if (!state.text) { openEdit(); return; }
  state.playing = !state.playing;
  if (state.playing) {
    sendCommand({ type: 'play' });
    startScroll();
  } else {
    sendCommand({ type: 'pause', position: currentPos });
    stopScroll(); applyScrollPos();
  }
  updatePlayBtn(); updateDim();
}

function onSpeed(val) {
  state.speed = +val;
  document.getElementById('speedVal').textContent = val;
  sendCommand({ type: 'speed', speed: +val, position: currentPos });
}

function onFontSize(val) {
  state.fontSize = +val;
  document.getElementById('fontVal').textContent = val;
  sendCommand({ type: 'fontSize', fontSize: +val });
  setTimeout(calcHeight, 80);
}

function onTextPadding(val) {
  state.textPadding = +val;
  document.getElementById('paddingVal').textContent = val + '%';
  applyTextPadding();
  sendCommand({ type: 'textPadding', textPadding: +val });
  setTimeout(calcHeight, 80);
}

function applyTextPadding() {
  const p = state.textPadding + '%';
  // Apply padding to the wraps (left+right), text fills 100% of wrap
  const wraps = [
    document.getElementById('ctrlTextWrap'),
    document.getElementById('dispWrap')
  ];
  wraps.forEach(w => {
    if (w) {
      w.style.paddingLeft = p;
      w.style.paddingRight = p;
    }
  });
}

function seekBack() {
  currentPos = Math.max(0, currentPos - window.innerHeight * 0.8);
  sendCommand({ type: 'seek', position: currentPos });
  applyScrollPos(); updateProgress();
}

function seekFwd() {
  currentPos = Math.min(totalHeight, currentPos + window.innerHeight * 0.8);
  sendCommand({ type: 'seek', position: currentPos });
  applyScrollPos(); updateProgress();
}

function openEdit() {
  document.getElementById('scriptInput').value = state.text || '';
  document.getElementById('editModal').classList.add('active');
  setTimeout(() => document.getElementById('scriptInput').focus(), 100);
}

function closeEdit() {
  document.getElementById('editModal').classList.remove('active');
}

function sendText() {
  const text = document.getElementById('scriptInput').value.trim();
  if (!text) return;
  sendCommand({ type: 'setText', text });
  closeEdit();
}

function loadFile(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('scriptInput').value = ev.target.result;
    document.getElementById('editModal').classList.add('active');
  };
  reader.readAsText(file, 'UTF-8');
  e.target.value = '';
}

window.addEventListener('resize', () => {
  if (role === 'controller') initMirrorScale();
  calcHeight();
});

function initMirrorScale() {
  const mirror = document.getElementById('ctrlMirror');
  const wrap = document.getElementById('ctrlTextWrap');
  if (!mirror || !wrap) return;

  // Use actual display dimensions if known, otherwise reasonable defaults
  const dW = displayW || 390;
  const dH = displayH || 844;

  // Mirror can take at most 45% of the controller's screen height
  const maxMirrorH = window.innerHeight * 0.45;
  // We also want to fit display width into mirror width
  const mirrorW = mirror.offsetWidth || window.innerWidth;
  const scaleByWidth = mirrorW / dW;
  const scaleByHeight = maxMirrorH / dH;
  // Use the smaller scale so the mirror fits both constraints
  const scale = Math.min(scaleByWidth, scaleByHeight);

  // The wrap renders at actual display width so line breaks match exactly
  wrap.style.width = dW + 'px';
  wrap.style.paddingLeft = '32px';
  wrap.style.paddingRight = '32px';
  wrap.style.transformOrigin = 'top left';
  wrap.dataset.scale = scale;
  window._mirrorScale = scale;
  window._displayH = dH;

  // Mirror height = exactly one display screen, scaled
  const mirrorHeight = dH * scale;
  mirror.style.flex = 'none';
  mirror.style.height = mirrorHeight + 'px';

  // Bottom padding matches display's 100vh equivalent
  wrap.style.paddingBottom = dH + 'px';

  // If scaled content is narrower than mirror, center it
  const scaledW = dW * scale;
  if (scaledW < mirrorW) {
    wrap.style.left = ((mirrorW - scaledW) / 2) + 'px';
  } else {
    wrap.style.left = '0px';
  }

  calcHeight();
}

function applyMirrorDimensions() {
  if (!displayW || !displayH) return;
  initMirrorScale();
}
</script>
