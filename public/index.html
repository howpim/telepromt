<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Prompter">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="/manifest.json">
<title>Телепромптер</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: #2a2a2a;
    --accent: #e8ff00;
    --accent2: #ff4d00;
    --text: #f0f0f0;
    --muted: #555;
    --green: #00ff88;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100dvh;
    overflow: hidden;
  }

  /* ── SCREENS ── */
  .screen { display: none; width: 100%; min-height: 100dvh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ── ROLE SELECT ── */
  #screen-role {
    align-items: center;
    justify-content: center;
    gap: 0;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }
  #screen-role::before {
    content: 'PROMPTER';
    position: absolute;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38vw;
    color: #111;
    letter-spacing: -2vw;
    line-height: 1;
    user-select: none;
    pointer-events: none;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  .role-inner {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    padding: 40px 24px;
  }
  .role-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 4px;
    color: var(--accent);
    text-align: center;
    line-height: 1;
  }
  .role-subtitle {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
  }
  .role-buttons { display: flex; flex-direction: column; gap: 12px; width: 260px; }
  .btn-role {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 18px 24px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .btn-role:active { transform: scale(0.97); }
  .btn-role.controller { border-color: var(--accent); }
  .btn-role.controller:active { background: var(--accent); color: var(--bg); }
  .btn-role.display { border-color: var(--border); }
  .btn-role.display:active { background: var(--surface); }
  .btn-role-icon { font-size: 22px; }
  .btn-role-text { display: flex; flex-direction: column; gap: 2px; }
  .btn-role-label { font-size: 13px; letter-spacing: 2px; }
  .btn-role-desc { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: none; font-family: 'IBM Plex Sans', sans-serif; }

  /* ── STATUS DOT ── */
  .status-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--border);
    z-index: 100;
  }
  .status-bar-fill {
    height: 100%;
    width: 0%;
    background: var(--accent);
    transition: width 0.3s;
  }

  /* ── CONTROLLER ── */
  #screen-controller {
    background: var(--bg);
    flex-direction: column;
  }
  .ctrl-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .ctrl-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--accent);
  }
  .conn-status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .conn-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .conn-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }

  /* Text input area */
  .text-area-wrap {
    flex: 1;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    overflow: hidden;
    min-height: 0;
  }
  .text-area-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    flex-shrink: 0;
  }
  #scriptInput {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    padding: 14px;
    resize: none;
    outline: none;
    border-radius: 0;
    -webkit-appearance: none;
    min-height: 0;
    transition: border-color 0.2s;
  }
  #scriptInput:focus { border-color: var(--accent); }
  #scriptInput::placeholder { color: var(--muted); }

  .load-row {
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }
  .btn-load {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 14px;
    cursor: pointer;
    flex: 1;
    transition: all 0.15s;
  }
  .btn-load:active { border-color: var(--accent); color: var(--accent); }

  /* Controls panel */
  .ctrl-panel {
    border-top: 1px solid var(--border);
    padding: 16px 20px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Speed */
  .speed-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .speed-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    min-width: 50px;
  }
  .speed-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--accent);
    min-width: 48px;
    text-align: right;
  }
  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    background: var(--border);
    outline: none;
    border-radius: 0;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    background: var(--accent);
    border-radius: 0;
    cursor: pointer;
  }

  /* Font size row */
  .font-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .font-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    min-width: 50px;
  }
  .font-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--text);
    min-width: 48px;
    text-align: right;
  }

  /* Transport buttons */
  .transport {
    display: grid;
    grid-template-columns: 1fr 2fr 1fr;
    gap: 10px;
  }
  .btn-transport {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 22px;
    padding: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.1s;
    -webkit-appearance: none;
    border-radius: 0;
    touch-action: manipulation;
  }
  .btn-transport:active { transform: scale(0.94); background: var(--border); }
  #btnPlay {
    border-color: var(--accent);
    font-size: 28px;
  }
  #btnPlay.playing {
    background: var(--accent);
    color: var(--bg);
  }

  /* Seek strip */
  .seek-strip {
    position: relative;
    height: 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    overflow: hidden;
  }
  .seek-fill {
    height: 100%;
    background: var(--accent);
    opacity: 0.15;
    transition: width 0.3s linear;
    pointer-events: none;
  }
  .seek-label {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    pointer-events: none;
  }

  /* ── DISPLAY ── */
  #screen-display {
    background: #000;
    position: relative;
    overflow: hidden;
    touch-action: none;
    user-select: none;
  }
  .display-text-wrap {
    position: absolute;
    width: 100%;
    padding: 0px 32px 100vh 32px;
    will-change: transform;
  }
  #displayText {
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 300;
    font-size: 52px;
    line-height: 1.35;
    color: #ffffff;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .display-cue {
    position: fixed;
    top: 38%;
    left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    opacity: 0.4;
    pointer-events: none;
    z-index: 11;
  }
  .display-waiting {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 3px;
    color: #333;
    text-transform: uppercase;
    z-index: 5;
  }

  /* ── FILE INPUT hidden ── */
  #fileInput { display: none; }
</style>
</head>
<body>

<div class="status-bar"><div class="status-bar-fill" id="statusBar"></div></div>

<!-- ROLE SELECT -->
<div id="screen-role" class="screen active">
  <div class="role-inner">
    <div>
      <div class="role-title">Prompter</div>
      <div class="role-subtitle">Выберите роль устройства</div>
    </div>
    <div class="role-buttons">
      <button class="btn-role controller" onclick="joinAs('controller')">
        <span class="btn-role-icon">🎛</span>
        <span class="btn-role-text">
          <span class="btn-role-label">Контроллер</span>
          <span class="btn-role-desc">Управление, текст, скорость</span>
        </span>
      </button>
      <button class="btn-role display" onclick="joinAs('display')">
        <span class="btn-role-icon">📺</span>
        <span class="btn-role-text">
          <span class="btn-role-label">Дисплей</span>
          <span class="btn-role-desc">Только отображение текста</span>
        </span>
      </button>
    </div>
  </div>
</div>

<!-- CONTROLLER -->
<div id="screen-controller" class="screen">
  <div class="ctrl-header">
    <div class="ctrl-logo">PROMPTER</div>
    <div class="conn-status">
      <div class="conn-dot" id="connDot"></div>
      <span id="connLabel">OFFLINE</span>
    </div>
  </div>

  <div class="text-area-wrap">
    <div class="text-area-label">Текст скрипта</div>
    <textarea id="scriptInput" placeholder="Вставьте или введите текст..." spellcheck="false"></textarea>
    <div class="load-row">
      <button class="btn-load" onclick="document.getElementById('fileInput').click()">📁 Загрузить .txt</button>
      <button class="btn-load" onclick="sendText()">↑ Отправить</button>
    </div>
  </div>
  <input type="file" id="fileInput" accept=".txt" onchange="loadFile(event)">

  <div class="ctrl-panel">
    <!-- Speed -->
    <div class="speed-row">
      <span class="speed-label">Скорость</span>
      <input type="range" id="speedSlider" min="10" max="300" value="50" oninput="onSpeed(this.value)">
      <span class="speed-value" id="speedVal">50</span>
    </div>

    <!-- Font size -->
    <div class="font-row">
      <span class="font-label">Размер</span>
      <input type="range" id="fontSlider" min="24" max="120" value="52" oninput="onFontSize(this.value)">
      <span class="font-value" id="fontVal">52</span>
    </div>

    <!-- Seek -->
    <div class="seek-strip" id="seekStrip" ontouchstart="onSeekTouch(event)" onclick="onSeekClick(event)">
      <div class="seek-fill" id="seekFill"></div>
      <span class="seek-label">ПОЗИЦИЯ</span>
    </div>

    <!-- Transport -->
    <div class="transport">
      <button class="btn-transport" onclick="rewind()">⏮</button>
      <button class="btn-transport" id="btnPlay" onclick="togglePlay()">▶</button>
      <button class="btn-transport" onclick="forward()">⏭</button>
    </div>
  </div>
</div>

<!-- DISPLAY -->
<div id="screen-display" class="screen">
  <div class="display-cue"></div>
  <div class="display-text-wrap" id="textWrap">
    <div id="displayText"></div>
  </div>
  <div class="display-waiting" id="displayWaiting">ОЖИДАНИЕ СИГНАЛА...</div>
</div>

<script>
// ── CONFIG ──
const WS_URL = location.protocol === 'https:' 
  ? `wss://${location.host}` 
  : `ws://${location.host}`;

// ── STATE ──
let ws = null;
let role = null;
let state = { text: '', playing: false, speed: 50, position: 0, fontSize: 52 };
let animFrame = null;
let lastTimestamp = null;
let currentPos = 0;
let totalHeight = 0;

// ── CONNECT ──
function connect() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    setConnected(true);
    ws.send(JSON.stringify({ type: 'join', role }));
  };

  ws.onclose = () => {
    setConnected(false);
    setTimeout(connect, 2000);
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleMessage(msg);
  };
}

function setConnected(v) {
  if (role !== 'controller') return;
  const dot = document.getElementById('connDot');
  const lbl = document.getElementById('connLabel');
  if (v) { dot.classList.add('online'); lbl.textContent = 'ОНЛАЙН'; }
  else { dot.classList.remove('online'); lbl.textContent = 'ОФЛАЙН'; }
}

// ── MESSAGE HANDLER ──
function handleMessage(msg) {
  switch (msg.type) {
    case 'state':
      applyState(msg);
      break;
    case 'play':
      state.playing = true;
      state.speed = msg.speed;
      // Display uses its own currentPos to avoid jump on resume
      if (role === 'controller') currentPos = msg.position;
      lastTimestamp = performance.now();
      startScroll();
      updatePlayBtn();
      break;
    case 'pause':
      state.playing = false;
      // Display keeps its own currentPos to avoid jump
      // Controller takes server position for seek bar accuracy
      if (role === 'controller') currentPos = msg.position;
      stopScroll();
      applyScrollPos();
      updatePlayBtn();
      updateSeek();
      break;
    case 'seek':
      currentPos = msg.position;
      lastTimestamp = performance.now() - (Date.now() - msg.lastUpdate);
      if (msg.playing) startScroll();
      else applyScrollPos();
      updateSeek();
      break;
    case 'speed':
      state.speed = msg.speed;
      currentPos = msg.position;
      lastTimestamp = performance.now() - (Date.now() - msg.lastUpdate);
      if (role === 'controller') {
        document.getElementById('speedSlider').value = msg.speed;
        document.getElementById('speedVal').textContent = msg.speed;
      }
      break;
    case 'fontSize':
      state.fontSize = msg.fontSize;
      applyFontSize();
      break;
  }
}

function applyState(s) {
  state = { ...state, ...s };
  currentPos = s.position;
  if (role === 'display') {
    document.getElementById('displayText').textContent = s.text;
    applyFontSize();
    calcHeight();
    applyScrollPos();
    if (s.text) document.getElementById('displayWaiting').style.display = 'none';
  }
  if (role === 'controller') {
    document.getElementById('scriptInput').value = s.text;
    document.getElementById('speedSlider').value = s.speed;
    document.getElementById('speedVal').textContent = s.speed;
    document.getElementById('fontSlider').value = s.fontSize;
    document.getElementById('fontVal').textContent = s.fontSize;
    updatePlayBtn();
    updateSeek();
  }
  if (s.playing) {
    lastTimestamp = performance.now();
    startScroll();
  }
}

// ── SCROLL ENGINE ──
function startScroll() {
  if (animFrame) cancelAnimationFrame(animFrame);
  lastTimestamp = lastTimestamp ?? performance.now();
  animFrame = requestAnimationFrame(scrollStep);
}

function stopScroll() {
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  lastTimestamp = null;
}

function scrollStep(ts) {
  if (!state.playing) { stopScroll(); return; }
  const dt = (ts - (lastTimestamp ?? ts)) / 1000;
  lastTimestamp = ts;
  currentPos += state.speed * dt;
  if (currentPos >= totalHeight) {
    currentPos = totalHeight;
    state.playing = false;
    stopScroll();
    updatePlayBtn();
    if (role === 'controller') ws?.send(JSON.stringify({ type: 'pause', position: currentPos }));
  }
  applyScrollPos();
  if (role === 'controller') updateSeek();
  animFrame = requestAnimationFrame(scrollStep);
}

function applyScrollPos() {
  if (role === 'display') {
    document.getElementById('textWrap').style.transform = `translateY(${-currentPos}px)`;
  }
}

function applyFontSize() {
  if (role === 'display') {
    document.getElementById('displayText').style.fontSize = state.fontSize + 'px';
    setTimeout(calcHeight, 50);
  }
}

function calcHeight() {
  const wrap = document.getElementById('textWrap');
  if (wrap) totalHeight = Math.max(0, wrap.scrollHeight - window.innerHeight);
}

function updatePlayBtn() {
  if (role !== 'controller') return;
  const btn = document.getElementById('btnPlay');
  btn.textContent = state.playing ? '⏸' : '▶';
  btn.classList.toggle('playing', state.playing);
}

function updateSeek() {
  if (role !== 'controller') return;
  const pct = totalHeight > 0 ? (currentPos / totalHeight) * 100 : 0;
  document.getElementById('seekFill').style.width = pct + '%';
  document.getElementById('statusBar').style.width = pct + '%';
}

// ── CONTROLLER ACTIONS ──
function joinAs(r) {
  role = r;
  showScreen(r === 'controller' ? 'screen-controller' : 'screen-display');
  connect();
  if (r === 'display') {
    // Keep screen on
    if ('wakeLock' in navigator) {
      navigator.wakeLock.request('screen').catch(() => {});
    }
  }
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function sendText() {
  const text = document.getElementById('scriptInput').value.trim();
  if (!text) return;
  ws?.send(JSON.stringify({ type: 'setText', text }));
  // calc height on controller side too
  totalHeight = estimateHeight(text, state.fontSize);
  updateSeek();
}

function estimateHeight(text, fs) {
  // rough estimate: chars per line based on screen width
  const charsPerLine = Math.floor(window.innerWidth / (fs * 0.55));
  const lines = text.split('\n').reduce((acc, line) => {
    return acc + Math.max(1, Math.ceil(line.length / charsPerLine));
  }, 0);
  return Math.max(0, lines * fs * 1.35);
}

function togglePlay() {
  if (!state.text && !document.getElementById('scriptInput').value) return;
  if (!state.text) sendText();
  state.playing = !state.playing;
  if (state.playing) {
    ws?.send(JSON.stringify({ type: 'play' }));
    startScroll();
  } else {
    ws?.send(JSON.stringify({ type: 'pause', position: currentPos }));
    stopScroll();
  }
  updatePlayBtn();
}

function rewind() {
  currentPos = Math.max(0, currentPos - window.innerHeight * 0.8);
  ws?.send(JSON.stringify({ type: 'seek', position: currentPos }));
  applyScrollPos();
  updateSeek();
}

function forward() {
  currentPos = Math.min(totalHeight, currentPos + window.innerHeight * 0.8);
  ws?.send(JSON.stringify({ type: 'seek', position: currentPos }));
  applyScrollPos();
  updateSeek();
}

function onSpeed(val) {
  state.speed = +val;
  document.getElementById('speedVal').textContent = val;
  ws?.send(JSON.stringify({ type: 'speed', speed: +val, position: currentPos }));
}

function onFontSize(val) {
  state.fontSize = +val;
  document.getElementById('fontVal').textContent = val;
  ws?.send(JSON.stringify({ type: 'fontSize', fontSize: +val }));
  totalHeight = estimateHeight(document.getElementById('scriptInput').value, +val);
  updateSeek();
}

function onSeekClick(e) {
  const strip = document.getElementById('seekStrip');
  const pct = e.offsetX / strip.offsetWidth;
  currentPos = pct * totalHeight;
  ws?.send(JSON.stringify({ type: 'seek', position: currentPos }));
  updateSeek();
}

function onSeekTouch(e) {
  e.preventDefault();
  const strip = document.getElementById('seekStrip');
  const rect = strip.getBoundingClientRect();
  const touch = e.touches[0];
  const pct = Math.min(1, Math.max(0, (touch.clientX - rect.left) / rect.width));
  currentPos = pct * totalHeight;
  ws?.send(JSON.stringify({ type: 'seek', position: currentPos }));
  updateSeek();
}

function loadFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    document.getElementById('scriptInput').value = ev.target.result;
  };
  reader.readAsText(file, 'UTF-8');
}

// ── DISPLAY: handle resize ──
window.addEventListener('resize', () => {
  if (role === 'display') calcHeight();
});

// ── Auto-send text on input blur (convenience) ──
document.getElementById('scriptInput').addEventListener('blur', () => {
  // don't auto-send, let user press button
});
</script>
</body>
</html>
